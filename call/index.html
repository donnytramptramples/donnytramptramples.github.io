  <!-- ✅ SAFE INLINE TAILWIND -->
  <style type="text/tailwindcss">
    @layer theme {
      :root {
        --primary-color: #3daee9;
        --dark-bg: #232629;
        --dark-surface: #31363b;
        --text-primary: #fcfcfc;
        --text-secondary: #bdc3c7;
      }
    }

    @layer base {
      body {
        @apply bg-[var(--dark-bg)] text-[var(--text-primary)] font-sans;
      }
    }

    @layer utilities {
      /* ✅ INPUT-SAFE GLASS EFFECT */
      .glass-effect {
        background: rgba(49, 54, 59, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);

        position: relative;
        z-index: 1;
        pointer-events: auto;
      }

      .glass-effect * {
        pointer-events: auto;
      }

      .glass-effect::before,
      .glass-effect::after {
        pointer-events: none;
      }

      /* ✅ GUARANTEE INPUT WORKS */
      input, textarea {
        pointer-events: auto !important;
        user-select: text !important;
        position: relative;
        z-index: 50;
      }
    }
  </style>
</head>
