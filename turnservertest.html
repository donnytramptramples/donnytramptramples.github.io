<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oundle Fortinet Bypass: 100+ Path Stress Tester</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #050505; color: #00ff41; padding: 20px; font-size: 13px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 20px; }
        .grid-header { display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 3fr; font-weight: bold; border-bottom: 1px solid #00ff41; padding: 10px; background: #111; }
        .row { display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 3fr; padding: 6px 10px; border-bottom: 1px solid #222; }
        .log { background: #000; border: 1px solid #333; height: 500px; overflow-y: scroll; margin-top: 10px; }
        .success { color: #fff; background: #008000; font-weight: bold; padding: 2px 4px; }
        .fail { color: #ff4141; opacity: 0.7; }
        .testing { color: #ffff00; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background: #00441b; color: #00ff41; cursor: wait; }
        #stats { font-size: 1.2rem; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Oundle Bypass Scanner</h1>
                <p>Status: <span id="progress">Waiting to start...</span></p>
            </div>
            <button id="runBtn" onclick="runMassiveScan()">RUN 100+ PATH SCAN</button>
        </div>

        <div id="stats">Successes: 0</div>

        <div class="grid-header">
            <div>Relay Endpoint</div>
            <div>Port</div>
            <div>Proto</div>
            <div>Type</div>
            <div>Result</div>
        </div>
        <div id="logOutput" class="log"></div>
    </div>

    <script>
        const logBox = document.getElementById('logOutput');
        const statsBox = document.getElementById('stats');
        const runBtn = document.getElementById('runBtn');
        const progress = document.getElementById('progress');

        // Brute-force parameters to generate 100+ paths
        const relayIPs = [
            '3.7.12.152',      // Metered Primary
            '13.235.158.122',  // Metered Secondary
            '15.206.115.151',  // Metered Tertiary
            '18.191.223.12',   // Metered Quaternary
            'global.xirsys.com'// Xirsys AWS
        ];
        const ports =; // Ports 53 and 443 are most likely to work
        const transports = ['udp', 'tcp'];
        let successCount = 0;

        function addRow(url, port, proto, type) {
            const id = 'id-' + Math.random().toString(36).substr(2, 9);
            logBox.innerHTML += `
                <div class="row" id="${id}">
                    <div style="font-size:10px">${url}</div>
                    <div>${port}</div>
                    <div>${proto}</div>
                    <div>${type}</div>
                    <div class="testing">WAITING...</div>
                </div>`;
            return id;
        }

        function updateRow(id, result, isSuccess) {
            const el = document.getElementById(id).lastElementChild;
            el.innerText = result;
            el.className = isSuccess ? 'success' : 'fail';
            if (isSuccess) {
                successCount++;
                statsBox.innerText = `Successes: ${successCount}`;
            }
        }

        async function testPath(url, type) {
            const rowId = addRow(url, url.split(':')[2].split('?')[0], url.split('=')[1] || 'udp', type);
            document.getElementById(rowId).children.innerText = 'TESTING...';
            
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: url, username: 'openrelayproject', credential: 'openrelayproject' }],
                    iceTransportPolicy: 'relay'
                });

                let solved = false;
                pc.onicecandidate = (e) => {
                    if (e.candidate && e.candidate.type === 'relay') {
                        solved = true;
                        updateRow(rowId, `✅ SUCCESS (${e.candidate.protocol})`, true);
                        pc.close();
                        resolve(true);
                    }
                };

                pc.onicecandidateerror = () => {
                    if (!solved) {
                        updateRow(rowId, '❌ BLOCKED', false);
                        pc.close();
                        resolve(false);
                    }
                };

                setTimeout(() => {
                    if (!solved) {
                        updateRow(rowId, '❌ TIMEOUT', false);
                        pc.close();
                        resolve(false);
                    }
                }, 5000);

                pc.createDataChannel('t');
                pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve(false));
            });
        }

        async function runMassiveScan() {
            runBtn.disabled = true;
            logBox.innerHTML = '';
            successCount = 0;
            statsBox.innerText = `Successes: 0`;

            const tasks = [];
            
            // Generate the 100+ path matrix
            for (let ip of relayIPs) {
                for (let port of ports) {
                    for (let t of transports) {
                        // Test TURN
                        tasks.push({ url: `turn:${ip}:${port}?transport=${t}`, type: 'TURN' });
                        // Test TURNS (TLS) over TCP
                        if (t === 'tcp') {
                            tasks.push({ url: `turns:${ip}:${port}?transport=tcp`, type: 'TURNS' });
                        }
                    }
                }
            }

            logBox.innerHTML += `<div>--- Generated ${tasks.length} unique paths. Testing in batches... ---</div>`;

            // Run in small batches so the firewall doesn't block the IP for flooding
            for (let i = 0; i < tasks.length; i++) {
                progress.innerText = `Testing ${i+1}/${tasks.length}...`;
                await testPath(tasks[i].url, tasks[i].type);
            }

            progress.innerText = "Scan Complete.";
            runBtn.disabled = false;
        }
    </script>
</body>
</html>
