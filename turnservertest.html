<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oundle Fortinet Bypass: 100+ Path Stress Tester</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #050505; color: #00ff41; padding: 20px; font-size: 12px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 20px; }
        .grid-header { display: grid; grid-template-columns: 4fr 1fr 1fr 1fr 3fr; font-weight: bold; border-bottom: 1px solid #00ff41; padding: 10px; background: #111; }
        .row { display: grid; grid-template-columns: 4fr 1fr 1fr 1fr 3fr; padding: 6px 10px; border-bottom: 1px solid #222; }
        .log-container { background: #000; border: 1px solid #333; height: 600px; overflow-y: scroll; margin-top: 10px; }
        .success { color: #fff; background: #008000; font-weight: bold; padding: 2px 6px; border-radius: 3px; }
        .fail { color: #ff4141; opacity: 0.6; }
        .testing { color: #ffff00; font-weight: bold; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 1.1rem; border-radius: 4px; }
        button:hover { background: #00cc33; }
        button:disabled { background: #00441b; color: #00ff41; cursor: wait; }
        #stats { font-size: 1.4rem; margin-top: 10px; color: #fff; font-weight: bold; }
        .summary-card { background: #111; border: 1px solid #00ff41; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Oundle Fortinet Bypass Scanner</h1>
                <p>Status: <span id="progress">Ready to scan 100+ paths...</span></p>
            </div>
            <button id="runBtn" onclick="runMassiveScan()">RUN 100+ PATH SCAN</button>
        </div>

        <div class="summary-card">
            <div id="stats">Successes: 0</div>
            <div id="p2pStatus" style="color: #ff4141;">P2P Mode: BLOCKED (Fortinet Active)</div>
        </div>

        <div class="grid-header">
            <div>Relay Endpoint (Full URL)</div>
            <div>Port</div>
            <div>Proto</div>
            <div>Type</div>
            <div>Result</div>
        </div>
        <div id="logOutput" class="log-container"></div>
    </div>

    <script>
        const logBox = document.getElementById('logOutput');
        const statsBox = document.getElementById('stats');
        const runBtn = document.getElementById('runBtn');
        const progress = document.getElementById('progress');

        // Brute-force parameters to generate 100+ bypass paths
        const relayIPs = [
            '3.7.12.152',      // Metered Relay 1
            '13.235.158.122',  // Metered Relay 2
            '15.206.115.151',  // Metered Relay 3
            '18.191.223.12',   // Metered Relay 4
            '35.154.218.42',   // Metered Relay 5
            'global.xirsys.com'// Xirsys AWS Global
        ];
        const ports = [53, 80, 443, 3478, 19302, 19305, 5349]; 
        const transports = ['udp', 'tcp'];
        let successCount = 0;

        function addRow(url, port, proto, type) {
            const id = 'id-' + Math.random().toString(36).substr(2, 9);
            const row = document.createElement('div');
            row.className = 'row';
            row.id = id;
            row.innerHTML = `
                <div style="font-size:10px; color:#aaa;">${url}</div>
                <div>${port}</div>
                <div>${proto.toUpperCase()}</div>
                <div>${type}</div>
                <div class="testing">PENDING...</div>
            `;
            logBox.appendChild(row);
            return id;
        }

        function updateRow(id, result, isSuccess) {
            const row = document.getElementById(id);
            if (!row) return;
            const statusEl = row.querySelector('.testing') || row.querySelector('.fail') || row.querySelector('.success');
            statusEl.innerText = result;
            statusEl.className = isSuccess ? 'success' : 'fail';
            if (isSuccess) {
                successCount++;
                statsBox.innerText = `Successes: ${successCount}`;
                row.style.background = 'rgba(0, 128, 0, 0.1)';
            }
        }

        async function testSinglePath(url, type) {
            const port = url.split(':').pop().split('?')[0];
            const proto = url.includes('tcp') ? 'tcp' : 'udp';
            const rowId = addRow(url, port, proto, type);
            
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: url, username: 'openrelayproject', credential: 'openrelayproject' }],
                    iceTransportPolicy: 'relay'
                });

                let solved = false;
                pc.onicecandidate = (e) => {
                    if (e.candidate && e.candidate.type === 'relay') {
                        solved = true;
                        updateRow(rowId, `✅ RELAY OPEN (${e.candidate.protocol})`, true);
                        pc.close();
                        resolve(true);
                    }
                };

                pc.onicecandidateerror = () => {
                    if (!solved) {
                        updateRow(rowId, '❌ BLOCKED', false);
                        pc.close();
                        resolve(false);
                    }
                };

                // Schools like Oundle often use DPI which takes time. We wait 6 seconds.
                setTimeout(() => {
                    if (!solved) {
                        updateRow(rowId, '❌ TIMEOUT', false);
                        pc.close();
                        resolve(false);
                    }
                }, 6000);

                pc.createDataChannel('t');
                pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve(false));
            });
        }

        async function runMassiveScan() {
            runBtn.disabled = true;
            logBox.innerHTML = '';
            successCount = 0;
            statsBox.innerText = `Successes: 0`;

            const tasks = [];
            
            // Build the 100+ path matrix
            for (let ip of relayIPs) {
                for (let port of ports) {
                    for (let t of transports) {
                        // Standard TURN
                        tasks.push({ url: `turn:${ip}:${port}?transport=${t}`, type: 'TURN' });
                        // TLS (TURNS) - The Oundle Fortinet Bypass
                        if (t === 'tcp') {
                            tasks.push({ url: `turns:${ip}:${port}?transport=tcp`, type: 'TURNS' });
                        }
                    }
                }
            }

            progress.innerText = `Scan started. Testing ${tasks.length} paths...`;

            // Test sequentially so the firewall doesn't trigger a DoS block
            for (let i = 0; i < tasks.length; i++) {
                progress.innerText = `Scanning path ${i + 1} of ${tasks.length}...`;
                await testSinglePath(tasks[i].url, tasks[i].type);
                
                // Slow scroll to bottom
                logBox.scrollTop = logBox.scrollHeight;
            }

            progress.innerText = "Scan Complete. Check green rows for bypass URLs.";
            runBtn.disabled = false;
        }
    </script>
</body>
</html>
